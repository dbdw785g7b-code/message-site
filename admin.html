<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>留言管理后台</title>
<style>
body{padding:30px;background:#f4f6f9;}
h2{text-align:center;color:#23529c;}
.item{background:#fff;padding:15px;margin:10px 0;border-radius:6px;}
.btn{padding:8px 20px;background:red;color:#fff;border:none;border-radius:4px;}
</style>
</head>
<body>
<h2>所有留言记录</h2>
<div id="list"></div>
<center><button class="btn" onclick="clearAll()">清空所有留言</button></center>

<script>
function showList(){
let data=JSON.parse(localStorage.getItem("lylist")||"[]");
let html="";
if(data.length==0){
document.getElementById("list").innerHTML="<h3 style='text-align:center'>暂无留言</h3>";
return;
}
for(let i=0;i<data.length;i++){
html+=`
<div class="item">
<p>提交时间：${data[i].time}</p >
<p>姓　　名：${data[i].name}</p >
<p>部　　门：${data[i].banji}</p >
<p>联系电话：${data[i].phone}</p >
<p>留言内容：${data[i].nr}</p >
</div>
`
}
document.getElementById("list").innerHTML=html;
}
function clearAll(){
if(confirm("确定清空全部留言？")){
localStorage.removeItem("lylist");
showList();
}
}
showList();
</script>
</body>
</html>
